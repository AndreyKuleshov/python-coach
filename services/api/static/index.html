<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>python-coach</title>
    <!-- No-flash theme init: apply saved/OS theme before first paint to avoid FOUC.
         Runs synchronously before any CSS or body content is painted. -->
    <script>
      (function () {
        var stored = localStorage.getItem("python-coach.theme");
        var theme =
          stored === "dark" || stored === "light"
            ? stored
            : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <!-- CodeMirror 5 from CDN: minimal editor, no build step (architect MVP choice). -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
    <!-- CodeMirror material dark theme (pinned 5.65.16): loaded for dark-mode editors. -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <!-- marked: render lesson markdown without a backend renderer. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <!-- DOMPurify: sanitize AI-generated HTML before innerHTML insertion (self-XSS guard). -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.4/purify.min.js"></script>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <header>
      <h1>python-coach <span class="tag">MVP skeleton</span></h1>
      <div class="header-right">
        <!-- Auth controls: logged-out shows nothing here (the auth form is the
             page itself); logged-in shows email + logout. -->
        <span id="auth-status" class="auth-status">
          <span id="auth-user" class="auth-user hidden">
            <!-- The account email links to the personal profile/cabinet. -->
            <a id="auth-email" href="/profile" data-testid="auth-email" class="auth-email-link"></a>
            <button type="button" id="logout-btn" data-testid="logout-btn">Log out</button>
          </span>
        </span>
        <!-- Theme toggle: single button cycling light/dark. data-theme-active
             is updated by theme.js when the user switches. -->
        <button
          type="button"
          id="theme-toggle"
          class="theme-toggle"
          data-testid="theme-toggle"
          data-theme-active="light"
          aria-label="Switch to dark mode"
          title="Switch to dark mode"
        >
          <span class="theme-toggle-icon" aria-hidden="true">☾</span>
          <span class="theme-toggle-label">Dark</span>
        </button>
        <div class="lang-switch" data-testid="lang-switch">
          <button type="button" data-testid="lang-en" data-locale="en">EN</button>
          <button type="button" data-testid="lang-ru" data-locale="ru">RU</button>
        </div>
      </div>
    </header>

    <main>
      <!-- AUTH GATE: the only content a logged-out visitor ever sees. Holds the
           login + register forms inline (NOT a modal). Shown on every route
           while logged out; hidden once authenticated. -->
      <section id="auth-gate" class="auth-gate hidden" data-testid="auth-gate">
        <div class="auth-card">
          <!-- Login form: starts hidden; showLoginForm() in auth.js reveals it. -->
          <form id="login-form" class="hidden" data-testid="login-form">
            <h2 id="login-heading">Log in</h2>
            <label id="login-email-label" for="login-email">Email</label>
            <input type="email" id="login-email" data-testid="login-email" autocomplete="email" />
            <label id="login-password-label" for="login-password">Password</label>
            <input type="password" id="login-password" data-testid="login-password" autocomplete="current-password" />
            <button type="submit" id="login-submit" data-testid="login-submit">Log in</button>
            <p id="login-error" class="form-error hidden" data-testid="login-error"></p>
            <p class="form-switch">
              <span id="login-switch-prompt">No account?</span>
              <a href="#" id="show-register" data-testid="show-register">Register</a>
            </p>
          </form>

          <!-- Register form -->
          <form id="register-form" class="hidden" data-testid="register-form">
            <h2 id="register-heading">Register</h2>
            <label id="register-email-label" for="register-email">Email</label>
            <input type="email" id="register-email" data-testid="register-email" autocomplete="email" />
            <label id="register-password-label" for="register-password">Password</label>
            <input type="password" id="register-password" data-testid="register-password" autocomplete="new-password" />
            <button type="submit" id="register-submit" data-testid="register-submit">Register</button>
            <p id="register-error" class="form-error hidden" data-testid="register-error"></p>
            <p class="form-switch">
              <span id="register-switch-prompt">Have an account?</span>
              <a href="#" id="show-login" data-testid="show-login">Log in</a>
            </p>
          </form>

          <!-- "Check your email" confirmation-pending state -->
          <div id="confirm-pending" class="hidden" data-testid="confirm-pending">
            <h2 id="confirm-pending-heading">Check your email</h2>
            <p id="confirm-pending-text" data-testid="confirm-pending-text"></p>
            <p class="form-switch">
              <a href="#" id="confirm-back-to-login" data-testid="confirm-back-to-login">Log in</a>
            </p>
          </div>
        </div>
      </section>

      <!-- LIST VIEW: the authenticated lessons list (its own /lessons route). -->
      <section id="lesson-list-section" class="hidden">
        <h2 id="list-heading" data-testid="list-heading">Lessons</h2>
        <!-- Shown when a locked row is clicked or a locked deep-link redirected here. -->
        <p id="locked-hint" class="locked-hint hidden" data-testid="locked-hint"></p>
        <ul id="lesson-list" data-testid="lesson-list" class="lesson-list"></ul>
      </section>

      <!-- LESSON VIEW: shown when ?lesson=<slug> is present (authenticated). -->
      <section id="lesson-section" class="hidden">
        <a id="back-to-lessons" href="/lessons" data-testid="back-to-lessons" class="back-link">← Back to lessons</a>
        <h2 id="lesson-title" data-testid="lesson-title">Loading…</h2>
        <div id="lesson-body" class="markdown" data-testid="lesson-body"></div>
      </section>

      <section id="exercise-section" class="hidden">
        <!-- Lesson-level progress counter: "X / N solved" -->
        <p id="progress-counter" class="progress-counter" data-testid="progress-counter"></p>

        <!-- All exercise blocks are rendered here by exercise.js -->
        <div id="exercises-container" data-testid="exercises-container"></div>

        <!-- LESSON COMPLETED state: shown when every exercise is solved. -->
        <div id="lesson-completion" class="completion hidden" data-testid="lesson-completion">
          <p id="completion-text" class="completion-text" data-testid="completion-text"></p>
          <button type="button" id="next-lesson-btn" class="hidden" data-testid="next-lesson-btn"></button>
          <p id="all-complete-msg" class="hidden" data-testid="all-complete-msg"></p>
        </div>
      </section>

      <!-- PROFILE VIEW: personal cabinet (its own /profile route). -->
      <section id="profile-section" class="hidden" data-testid="profile-section">
        <a id="profile-back" href="/lessons" data-testid="profile-back" class="back-link">← Back to lessons</a>
        <h2 id="profile-heading" data-testid="profile-heading">Your progress</h2>
        <p class="profile-identity"><span id="profile-email" data-testid="profile-email"></span></p>
        <p id="profile-summary" class="profile-summary" data-testid="profile-summary"></p>
        <div class="progress-track" data-testid="profile-progress">
          <div id="profile-progress-bar" class="progress-bar" data-testid="profile-progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
        <ul id="profile-lessons" data-testid="profile-lessons" class="profile-lessons"></ul>
      </section>
    </main>
    <!-- Load order matters:
         theme.js  — applies saved/OS theme; exposes Coach.Theme for toggle wiring.
         i18n.js   — defines window.Coach.UI (read at app.js module top-level).
         auth.js   — token/auth helpers app.js reads immediately on execution.
         app.js    — list + lesson views; publishes locale helpers for profile.js.
         profile.js — profile view; reads app.js's locale helpers + UI catalog. -->
    <script src="/static/theme.js"></script>
    <script src="/static/i18n.js"></script>
    <script src="/static/auth.js"></script>
    <script src="/static/ai.js"></script>
    <script src="/static/solution.js"></script>
    <script src="/static/exercise.js"></script>
    <script src="/static/app.js"></script>
    <script src="/static/profile.js"></script>
  </body>
</html>
